<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALPHA DRIVE ONE | Voting Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.cdnfonts.com/css/ica-rubrik-black');
        @import url('https://fonts.cdnfonts.com/css/poppins');
        
        :root {
            --primary-gold: #e4dcb8;
            --secondary-gold: #85796e;
            --dark-bg: #0c0c0c;
            --light-text: #ffffff;
            --muted-text: #d0cee0;
            --nav-bg: rgba(0, 0, 0, 0.95);
            --card-bg: rgba(0, 0, 0, 0.8);
            --border-color: rgba(228, 220, 184, 0.3);
            --accent-gradient: linear-gradient(45deg, #e4dcb8, #9e9c3c);
            --success-color: #4CAF50;
            --warning-color: #ff9800;
            --danger-color: #ff5252;
            --input-bg: rgba(255, 255, 255, 0.05);
        }
        
        * { 
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        
        html { scroll-behavior: smooth; }
        
        body {
            font-family: "Poppins", sans-serif;
            background: linear-gradient(135deg, var(--dark-bg) 0%, var(--primary-gold) 50%, var(--secondary-gold) 100%);
            color: var(--light-text);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; opacity: 0.15;
            background: 
                radial-gradient(circle at 20% 30%, rgba(228, 220, 184, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(133, 121, 110, 0.1) 0%, transparent 40%);
            animation: float 20s infinite ease-in-out alternate;
        }

        @keyframes float { 0% { transform: scale(1) rotate(0deg); } 100% { transform: scale(1.1) rotate(180deg); } }

        /* Navigation */
        nav {
            width: 100%; min-height: 60px;
            background: var(--nav-bg);
            backdrop-filter: blur(10px);
            position: fixed; top: 0; left: 0; z-index: 1000;
            font-family: 'ICA Rubrik'; border-bottom: 1px solid var(--border-color);
            padding: 0 5%; transition: all 0.3s ease;
        }

        .nav-container {
            display: flex; align-items: center; justify-content: space-between;
            height: 60px; max-width: 1400px; margin: 0 auto;
        }

        .logo {
            font-size: 1rem; color: white; font-weight: 500;
            background: var(--accent-gradient); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; text-decoration: none;
            display: flex; align-items: center; gap: 8px;
        }

        .nav-toggle {
            background: none; border: none; color: var(--primary-gold);
            font-size: 1.5rem; cursor: pointer; z-index: 1001;
        }

        .nav-links {
            position: fixed; top: 60px; left: 0; width: 100%;
            background: rgba(0, 0, 0, 0.98);
            display: none; flex-direction: column; padding: 20px;
            border-bottom: 1px solid var(--border-color); z-index: 999;
        }

        .nav-links.active { display: flex; }

        .nav-link {
            color: var(--muted-text); text-decoration: none;
            padding: 15px; border-radius: 8px; transition: all 0.3s ease;
            display: flex; align-items: center; gap: 10px; cursor: pointer;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--light-text);
            background: rgba(228, 220, 184, 0.1);
            padding-left: 20px;
        }

        .nav-link.admin-mode-active {
            color: var(--primary-gold);
            background: rgba(228, 220, 184, 0.15);
            border: 1px solid var(--primary-gold);
        }

        /* Main Content */
        .main-content {
            margin-top: 60px; padding: 20px 5%;
            width: 100%; min-height: calc(100vh - 60px);
            max-width: 1400px; margin-left: auto; margin-right: auto;
        }

        /* Page Header */
        .page-header {
            text-align: center; margin-bottom: 30px; padding: 30px 20px;
            background: var(--card-bg); border-radius: 20px;
            border: 1px solid var(--border-color);
            animation: slideUp 0.8s ease;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .page-header h2 {
            background: linear-gradient(45deg, var(--primary-gold), var(--secondary-gold));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-size: 2rem; margin-bottom: 10px;
        }

        /* Admin Section */
        .admin-section {
            display: none; background: rgba(228, 220, 184, 0.05);
            border: 1px solid var(--primary-gold); border-radius: 15px;
            padding: 25px; margin-bottom: 30px;
        }

        .admin-section.visible { display: block; }

        .admin-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px;
        }

        .admin-header h3 { color: var(--primary-gold); font-size: 1.2rem; }

        .admin-form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }

        .form-group { display: flex; flex-direction: column; gap: 5px; }

        .form-group label { font-size: 0.85rem; color: var(--muted-text); }

        .form-control {
            background: var(--input-bg); border: 1px solid var(--border-color);
            border-radius: 8px; padding: 12px; color: white;
        }

        .form-control:focus { outline: none; border-color: var(--primary-gold); }

        .btn {
            padding: 12px 20px; border-radius: 8px; border: none;
            background: var(--accent-gradient); color: var(--dark-bg);
            font-weight: 600; cursor: pointer; width: 100%;
        }

        /* Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 30px; }

        .stat-card {
            background: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 15px; padding: 20px; text-align: center;
        }

        .stat-number {
            font-size: 2rem; font-weight: 700;
            background: var(--accent-gradient); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label { font-size: 0.8rem; color: var(--muted-text); text-transform: uppercase; }

        /* Filters */
        .links-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        
        .filters { display: flex; gap: 10px; flex-wrap: wrap; }

        .filter-btn {
            padding: 8px 16px; background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border-color); color: var(--muted-text);
            border-radius: 20px; cursor: pointer; font-size: 0.9rem;
        }

        .filter-btn.active {
            background: var(--accent-gradient); color: var(--dark-bg);
            border-color: var(--primary-gold);
        }

        .search-box {
            width: 100%; padding: 12px 20px;
            background: rgba(255, 255, 255, 0.1); border: 1px solid var(--border-color);
            border-radius: 25px; color: #ffffff; margin-bottom: 20px;
        }

        .search-box:focus { outline: none; border-color: var(--primary-gold); }

        /* Links Cards */
        .links-container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .link-card {
            background: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 15px; padding: 20px; position: relative;
            transition: transform 0.2s;
        }

        .link-card:hover { transform: translateY(-5px); border-color: var(--primary-gold); }

        .link-card.new { border: 2px solid var(--success-color); }

        .new-badge {
            position: absolute; top: -10px; right: 15px;
            background: var(--success-color); color: white;
            padding: 4px 10px; border-radius: 10px; font-size: 0.7rem; font-weight: bold;
        }

        .link-platform { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }

        .link-platform i {
            color: var(--primary-gold); font-size: 1.2rem;
            background: rgba(228, 220, 184, 0.1); padding: 10px; border-radius: 8px;
        }

        .link-platform h4 { margin: 0; font-size: 1.1rem; }

        .link-type {
            font-size: 0.75rem; padding: 4px 10px; border-radius: 12px;
            background: rgba(255,255,255,0.1); display: inline-block;
        }

        .link-type.daily { color: var(--success-color); border: 1px solid var(--success-color); }
        .link-type.emergency { color: var(--danger-color); border: 1px solid var(--danger-color); }

        .link-url {
            display: block; text-align: center; padding: 12px;
            background: rgba(255, 255, 255, 0.05); border-radius: 10px;
            color: var(--primary-gold); text-decoration: none; margin: 15px 0;
        }

        .link-notes { font-size: 0.9rem; color: var(--muted-text); margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; }

        .link-actions { display: flex; justify-content: space-between; margin-top: 15px; }
        
        .action-btn {
            background: transparent; border: 1px solid var(--border-color);
            color: var(--muted-text); padding: 5px 10px; border-radius: 5px;
            cursor: pointer; font-size: 0.8rem;
        }

        /* Modal - FIXED Z-INDEX */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); z-index: 9999;
            display: none; justify-content: center; align-items: center;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: #1a1a1a; border: 1px solid var(--primary-gold);
            padding: 30px; border-radius: 15px; width: 90%; max-width: 400px;
            text-align: center;
        }

        .modal h3 { color: var(--primary-gold); margin-bottom: 15px; }

        .modal input {
            width: 100%; padding: 12px; margin: 15px 0;
            background: #333; border: 1px solid #555; color: white; border-radius: 5px;
        }

        .modal-btns { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }

        .modal-btn { padding: 10px 20px; border-radius: 5px; border: none; cursor: pointer; }
        .btn-cancel { background: #444; color: white; }
        .btn-confirm { background: var(--primary-gold); color: black; font-weight: bold; }

        /* Mobile */
        @media (min-width: 768px) {
            .nav-links {
                position: static; display: flex; flex-direction: row;
                background: transparent; width: auto; gap: 20px;
                padding: 0; border: none;
            }
            .nav-toggle { display: none; }
            .nav-link { padding: 5px 10px; }
            .nav-link:hover { background: transparent; padding-left: 10px; }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation"></div>

    <!-- Navigation -->
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">
                <i class="fas fa-vote-yea"></i> ALPHA DRIVE ONE
            </a>
            <button class="nav-toggle" onclick="toggleMenu()">
                <i class="fas fa-bars"></i>
            </button>
            <div class="nav-links" id="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="#" class="nav-link active">Links</a>
                <!-- FIX: Added onclick directly to HTML -->
                <a href="#" id="admin-toggle-btn" class="nav-link" onclick="toggleAdmin(event)">
                    <i class="fas fa-user-shield"></i> Admin Mode
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Page Header -->
        <div class="page-header">
            <h2><i class="fas fa-vote-yea"></i> Voting Links</h2>
            <p>Manage and access all voting platforms here.</p>
        </div>

        <!-- Admin Dashboard (Hidden) -->
        <section id="admin-panel" class="admin-section">
            <div class="admin-header">
                <h3><i class="fas fa-plus-circle"></i> Add New Link</h3>
                <div id="connection-status" style="font-size: 0.8rem; color: var(--warning-color);">
                    <i class="fas fa-exclamation-triangle"></i> Check HTML Credentials
                </div>
            </div>
            
            <form id="add-link-form" class="admin-form-grid" onsubmit="handleAddLink(event)">
                <div class="form-group">
                    <label>Platform</label>
                    <input type="text" id="input-platform" class="form-control" placeholder="e.g. Idol Champ" required>
                </div>
                <div class="form-group">
                    <label>Link URL</label>
                    <input type="url" id="input-url" class="form-control" placeholder="https://..." required>
                </div>
                <div class="form-group">
                    <label>Type</label>
                    <select id="input-type" class="form-control">
                        <option value="daily">Daily Vote</option>
                        <option value="emergency">Emergency</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Notes</label>
                    <input type="text" id="input-notes" class="form-control" placeholder="Instructions">
                </div>
                <div class="form-group" style="grid-column: 1 / -1;">
                    <button type="submit" class="btn">Save to Database</button>
                </div>
            </form>
        </section>

        <!-- Quick Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="total-links">0</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="daily-links">0</div>
                <div class="stat-label">Daily</div>
            </div>
        </div>

        <!-- Links Section -->
        <section>
            <div class="links-header">
                <div class="filters">
                    <button class="filter-btn active" onclick="filterLinks('all')">All</button>
                    <button class="filter-btn" onclick="filterLinks('daily')">Daily</button>
                    <button class="filter-btn" onclick="filterLinks('emergency')">Emergency</button>
                </div>
            </div>

            <input type="text" id="search-box" class="search-box" placeholder="Search..." oninput="runSearch()">

            <div class="links-container" id="links-container">
                <div style="text-align:center; grid-column: 1/-1; padding: 20px;">
                    <div style="font-size: 2rem; color: var(--primary-gold); margin-bottom:10px;" class="fas fa-spinner fa-spin"></div>
                    <p>Loading...</p>
                </div>
            </div>
        </section>
    </main>

    <!-- Password Modal -->
    <div id="password-modal" class="modal-overlay">
        <div class="modal">
            <h3>Admin Access</h3>
            <p style="color: #ccc; font-size: 0.9rem;">Enter password to continue.</p>
            <input type="password" id="admin-password-input" placeholder="Password">
            <div class="modal-btns">
                <button class="modal-btn btn-cancel" onclick="closeModals()">Cancel</button>
                <button class="modal-btn btn-confirm" onclick="checkAdminPassword()">Unlock</button>
            </div>
        </div>
    </div>

    <script>
        // ================= CONFIGURATION =================
        // PASTE YOUR SUPABASE DETAILS BELOW
        const SUPABASE_URL = "https://jbjxljlaqarszwnehyye.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpianhsamxhcWFyc3p3bmVoeXllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMjIzMDMsImV4cCI6MjA4ODY5ODMwM30.EXumn0fsKv3ir_wxuH0Fh3oXzPaj1R2MI1S8ND_S2uQ";
        // ================================================

        const ADMIN_PASS = "admin123";
        let isAdmin = false;
        let supabase = null;
        let supabaseLinks = [];

        // Static Fallback Data
        const STATIC_LINKS = [
            { id: 1, Platform: "Muniverse Web", Link: "https://t.co/vWMY1WciMX", Type: "daily", Notes: "STAGE M PICK", Status: "active", isNew: true },
            { id: 2, Platform: "UPICK", Link: "https://t.co/nZ2rnaHIFV", Type: "emergency", Notes: "Best Rising Star", Status: "active", isNew: true },
        ];

        let allLinks = [...STATIC_LINKS];

        // --- INIT ---
        window.onload = function() {
            initSupabase();
            renderLinks(allLinks);
            updateStats();
        };

        // --- NAVIGATION ---
        function toggleMenu() {
            document.getElementById('nav-links').classList.toggle('active');
        }

        // --- ADMIN TOGGLE (FIXED) ---
        function toggleAdmin(e) {
            e.preventDefault(); // Stop page jump
            if (isAdmin) {
                // Logout
                isAdmin = false;
                document.getElementById('admin-panel').classList.remove('visible');
                document.getElementById('admin-toggle-btn').classList.remove('admin-mode-active');
                document.getElementById('admin-toggle-btn').innerHTML = '<i class="fas fa-user-shield"></i> Admin Mode';
                showToast("Admin mode off");
            } else {
                // Show Login
                document.getElementById('password-modal').classList.add('active');
                document.getElementById('admin-password-input').value = '';
                document.getElementById('admin-password-input').focus();
            }
        }

        function checkAdminPassword() {
            const input = document.getElementById('admin-password-input').value;
            if (input === ADMIN_PASS) {
                isAdmin = true;
                closeModals();
                document.getElementById('admin-panel').classList.add('visible');
                document.getElementById('admin-toggle-btn').classList.add('admin-mode-active');
                document.getElementById('admin-toggle-btn').innerHTML = '<i class="fas fa-sign-out-alt"></i> Exit Admin';
                showToast("Welcome Admin");
            } else {
                showToast("Wrong Password");
            }
        }

        function closeModals() {
            document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active'));
        }

        // --- SUPABASE LOGIC ---
        function initSupabase() {
            if (!SUPABASE_URL.includes("PASTE_YOUR") && window.supabase) {
                try {
                    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                    document.getElementById('connection-status').innerHTML = '<span style="color:var(--success-color)"><i class="fas fa-check"></i> Connected</span>';
                    fetchSupabaseLinks();
                } catch (e) {
                    console.error(e);
                }
            }
        }

        async function fetchSupabaseLinks() {
            if (!supabase) return;
            const { data, error } = await supabase.from('voting_links').select('*').eq('status', 'active');
            
            if (!error && data) {
                supabaseLinks = data.map(item => ({
                    id: item.id, Platform: item.platform, Link: item.link,
                    Type: item.type, Notes: item.notes, Status: item.status,
                    isNew: item.is_new, isDbItem: true
                }));
                allLinks = [...STATIC_LINKS, ...supabaseLinks];
                renderLinks(allLinks);
                updateStats();
            }
        }

        async function handleAddLink(e) {
            e.preventDefault();
            if (!supabase) { showToast("Database not connected"); return; }

            const newLink = {
                platform: document.getElementById('input-platform').value,
                link: document.getElementById('input-url').value,
                type: document.getElementById('input-type').value,
                notes: document.getElementById('input-notes').value,
                status: 'active',
                is_new: true
            };

            const { error } = await supabase.from('voting_links').insert([newLink]);
            if (error) {
                showToast("Error: " + error.message);
            } else {
                showToast("Link Added!");
                document.getElementById('add-link-form').reset();
                fetchSupabaseLinks();
            }
        }

        // --- UI LOGIC ---
        function renderLinks(list) {
            const container = document.getElementById('links-container');
            if (list.length === 0) {
                container.innerHTML = '<p style="text-align:center; grid-column:1/-1;">No links found.</p>';
                return;
            }

            container.innerHTML = list.map(link => {
                const typeClass = link.Type === 'daily' ? 'daily' : 'emergency';
                const deleteBtn = isAdmin && link.isDbItem 
                    ? `<button onclick="deleteLink(${link.id})" class="action-btn" style="color:var(--danger-color)">Delete</button>` 
                    : '';
                
                return `
                <div class="link-card ${link.isNew ? 'new' : ''}">
                    ${link.isNew ? '<span class="new-badge">NEW</span>' : ''}
                    <div class="link-platform">
                        <i class="fas fa-vote-yea"></i>
                        <h4>${link.Platform}</h4>
                    </div>
                    <span class="link-type ${typeClass}">${link.Type.toUpperCase()}</span>
                    <a href="${link.Link}" target="_blank" class="link-url">Vote Now</a>
                    <div class="link-notes">${link.Notes || ''}</div>
                    <div class="link-actions">
                        <a href="${link.Link}" target="_blank" class="action-btn">Copy</a>
                        ${deleteBtn}
                    </div>
                </div>`;
            }).join('');
        }

        function filterLinks(type) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            
            const filtered = type === 'all' ? allLinks : allLinks.filter(l => l.Type === type);
            renderLinks(filtered);
        }

        function runSearch() {
            const term = document.getElementById('search-box').value.toLowerCase();
            const filtered = allLinks.filter(l => 
                l.Platform.toLowerCase().includes(term) || 
                (l.Notes && l.Notes.toLowerCase().includes(term))
            );
            renderLinks(filtered);
        }

        async function deleteLink(id) {
            if(!confirm("Delete this link?")) return;
            const { error } = await supabase.from('voting_links').delete().eq('id', id);
            if(!error) {
                showToast("Deleted");
                fetchSupabaseLinks();
            }
        }

        function updateStats() {
            document.getElementById('total-links').textContent = allLinks.length;
            document.getElementById('daily-links').textContent = allLinks.filter(l => l.Type === 'daily').length;
        }

        function showToast(msg) {
            const t = document.createElement('div');
            t.style.cssText = `position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#333; color:white; padding:10px 20px; border-radius:20px; z-index:10000; border:1px solid var(--primary-gold);`;
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2000);
        }
    </script>
</body>
</html>
